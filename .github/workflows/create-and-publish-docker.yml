name: 'call: create-and-publish-docker'

on:
  workflow_call:
    inputs:
      version:
        description: 'docker app version (e.g. v21.0.0)'
        required: true
        type: string
      description:
        description: 'docker app description (e.g. "Your sats. Your privacy. Your profit.")'
        required: true
        type: string
      ui_repo_ref:
        description: 'ui version/branch (e.g. v0.1.1, master, etc.)'
        required: true
        type: string
      server_repo_ref:
        description: 'server version/branch (e.g. v0.9.8, master, etc.)'
        required: true
        type: string
      ng_server_repo_ref:
        description: 'ng server version/branch (e.g. main, 0.32.0, etc.)'
        required: true
        type: string
      ng_ui_repo_ref:
        description: 'ng ui version/branch override for standalone-ng (e.g. devel, v2.0.0, etc.); falls back to ui_repo_ref if not set'
        required: false
        type: string
      image_name_prefix:
        description: 'image name prefix (e.g. joinmarket-webui/jam-)'
        required: true
        type: string
      skip_release_verification:
        description: 'enable skipping release verification'
        required: false
        default: false
        type: boolean
      images_matrix:
        description: 'the images you want to build as json array ([ "ui-only", "standalone-ng", "standalone" ])'
        required: false
        type: string
        default: '[ "ui-only", "standalone-ng", "standalone" ]'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
         context: ${{ fromJSON(inputs.images_matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to the Container registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ inputs.image_name_prefix }}${{ matrix.context }}
          labels: |
            org.opencontainers.image.title=jam-${{ matrix.context }}
            org.opencontainers.image.version=${{ inputs.version }}
            org.opencontainers.image.description=${{ inputs.description }}

      - name: Build and push Docker image for ${{ matrix.context }}
        uses: docker/build-push-action@v7.1.0
        env:
          SOURCE_DATE_EPOCH: 0
        with:
          context: ./${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            JAM_REPO_REF=${{ matrix.context == 'standalone-ng' && (inputs.ng_ui_repo_ref || inputs.ui_repo_ref) || inputs.ui_repo_ref }}
            JM_SERVER_REPO_REF=${{ inputs.server_repo_ref }}
            JM_NG_REPO_REF=${{ inputs.ng_server_repo_ref }}
            SKIP_RELEASE_VERIFICATION=${{ inputs.skip_release_verification }}
